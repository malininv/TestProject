<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Main Page</title>
    {%load static%}
    <link link rel="stylesheet" href="{% static 'testpr/main.css'%}">>
</head>
<body>
<form>
    <input type="text">
</form>
<p>Адресная строка: </p>
<div class="main-wrapper">
    {%block category%}
<div class="category">
    <ul>

{% for category in categories%}
        <li>{{category.name}}</li>
    {%endfor%}
    </ul>
</div>
    {%endblock%}
    {%block products%}
    <div class="product-list">
    {% for product in products %}
        <div class="product-container">{{product.name}}
        {%endfor%}</div>
</div>
    {%endblock%}
    </div>
</body>
</html>
